<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股新聞 | 燈塔財經</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f0f0f;--paper:#f5f0e8;--paper2:#ede8dc;--accent:#7a1a0a;--gold:#b8972a;--muted:#6b6560;--border:#c8c0b0;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;line-height:1.7}
.masthead{background:var(--ink);padding:20px 32px;color:var(--paper)}
.masthead-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'DM Serif Display','Noto Serif TC',serif;font-size:28px;color:#fff;text-decoration:none}.logo span{color:#c8102e}
.back-link{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);text-decoration:none;letter-spacing:.1em}.back-link:hover{color:#fff}
.cat-hero{background:var(--accent);color:#fff;padding:40px 32px}.cat-hero-inner,.content{max-width:1200px;margin:0 auto}
.cat-en{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;opacity:.6;margin-bottom:8px}.cat-title{font-family:'DM Serif Display','Noto Serif TC',serif;font-size:52px;line-height:1.05}.cat-desc{font-family:'Noto Serif TC',serif;font-size:14px;opacity:.85;margin-top:8px;letter-spacing:.05em}
.content{padding:40px 32px 80px}.page-meta{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);margin-bottom:18px}
.section-header{display:flex;align-items:center;gap:16px;padding:20px 0 14px;border-bottom:3px solid var(--ink);margin-bottom:24px}.section-header h2{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700}.section-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--muted)}.section-line{flex:1;height:1px;background:var(--border)}
.news-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border)}
.news-item{background:var(--paper);padding:24px 28px;display:grid;grid-template-columns:80px 1fr;gap:24px;align-items:start;text-decoration:none;color:var(--ink);transition:background .15s}.news-item:hover{background:#efe9dc}
.item-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;line-height:1.6;padding-top:4px}.item-headline{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.5}.item-summary{font-size:13px;color:var(--muted);line-height:1.8}.item-source{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);margin-top:10px}
footer{background:var(--ink);color:rgba(255,255,255,.4);text-align:center;padding:24px;font-family:'Space Mono',monospace;font-size:11px}
@media(max-width:768px){.content{padding:24px 16px 64px}.cat-hero{padding:32px 16px}.cat-title{font-size:40px}.news-item{grid-template-columns:1fr;gap:10px;padding:20px 18px}}
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-inner">
    <a href="../index.html" class="logo">燈<span>塔</span>財經</a>
    <a href="../index.html" class="back-link">返回首頁</a>
  </div>
</header>

<div class="cat-hero">
  <div class="cat-hero-inner">
    <div class="cat-en">STOCK</div>
    <div class="cat-title">台股</div>
    <div class="cat-desc">權值股、法人籌碼、盤勢焦點與台灣市場當日重點整理</div>
  </div>
</div>

<div class="content">
  <div class="page-meta" id="stock-meta">等待資料載入中</div>
  <div class="section-header"><div class="section-label">LATEST UPDATES</div><div class="section-line"></div><h2>台股新聞</h2></div>
  <div class="news-list" id="stock-news-list">
    <div style="padding:32px;color:var(--muted);font-family:'Noto Serif TC',serif;">台股新聞將在資料載入後顯示</div>
  </div>
</div>

<footer>燈塔財經 · 台股版</footer>
<script src="../news-render.js"></script>
</body>
</html>
